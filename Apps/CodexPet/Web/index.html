<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#087a93">
    <title>Codex Pet</title>
    <link rel="manifest" href="./manifest.webmanifest">
    <link rel="icon" sizes="192x192" href="./assets/icon-192.png">
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <h1>Codex Pet</h1>
          <p id="pet-caption">Mofu Monkey</p>
        </div>
        <div class="status-pill">
          <span class="status-dot" aria-hidden="true"></span>
          <span id="frame-status">live</span>
        </div>
      </header>

      <section class="stage" aria-label="Pet stage">
        <div class="sprite-slot" id="sprite-slot">
          <div class="pet-frame" id="pet-frame" role="img" aria-label="Mofu Monkey"></div>
        </div>
        <div class="ground-line" aria-hidden="true"></div>
      </section>

      <section class="controls" aria-label="Pet controls">
        <div class="segmented" role="group" aria-label="Pet">
          <button class="segment is-selected" type="button" data-pet="mofu-monkey">Mofu</button>
          <button class="segment" type="button" data-pet="mofu-monkey-dot">Dot</button>
        </div>

        <div class="motion-grid" role="group" aria-label="Pose">
          <button class="motion is-selected" type="button" data-motion="idle">Idle</button>
          <button class="motion" type="button" data-motion="running-right">Right</button>
          <button class="motion" type="button" data-motion="running-left">Left</button>
          <button class="motion" type="button" data-motion="waving">Wave</button>
          <button class="motion" type="button" data-motion="jumping">Jump</button>
          <button class="motion" type="button" data-motion="failed">Failed</button>
          <button class="motion" type="button" data-motion="waiting">Wait</button>
          <button class="motion" type="button" data-motion="running">Work</button>
          <button class="motion" type="button" data-motion="review">Review</button>
        </div>

        <label class="speed-control">
          <span>Speed</span>
          <input id="speed" type="range" min="0.25" max="2" step="0.25" value="1">
          <output id="speed-output" for="speed">1.00x</output>
        </label>
      </section>
    </main>

    <script src="./app.js" type="module"></script>
  </body>
</html>
