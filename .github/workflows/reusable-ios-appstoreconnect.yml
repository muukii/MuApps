name: iOS App Store Connect Deploy

on:
  workflow_call:
    inputs:
      scheme:
        description: 'Xcode scheme name'
        required: true
        type: string
      configuration:
        description: 'Build configuration'
        required: false
        type: string
        default: 'Release'
      xcode-version:
        description: 'Xcode version'
        required: true
        type: string
      macos-runner:
        description: 'macOS runner'
        required: true
        type: string
      entitlements-path:
        description: 'Path to entitlements file (optional, auto-detected if not specified)'
        required: false
        type: string
        default: ''
    secrets:
      ASC_KEY_ID:
        description: 'App Store Connect API Key ID'
        required: true
      ASC_KEY_CONTENT:
        description: 'App Store Connect API Key content (.p8)'
        required: true
      ASC_ISSUER_ID:
        description: 'App Store Connect Issuer ID'
        required: true
      TEAM_ID:
        description: 'Apple Developer Team ID'
        required: true

jobs:
  build-and-deploy:
    runs-on: ${{ inputs.macos-runner }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install mise
        uses: jdx/mise-action@v2
        with:
          install: true

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ inputs.xcode-version }}

      - name: Install dependencies with Tuist
        run: tuist install

      - name: Generate Xcode workspace with Tuist
        run: tuist generate --no-open

      - name: Setup App Store Connect API Key
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_KEY_CONTENT: ${{ secrets.ASC_KEY_CONTENT }}
        run: |
          mkdir -p ~/private_keys
          echo "$ASC_KEY_CONTENT" > ~/private_keys/AuthKey_${ASC_KEY_ID}.p8
          echo "API Key configured"

      - name: Archive app
        run: |
          set -e
          set -o pipefail

          xcodebuild archive \
            -workspace MuApps.xcworkspace \
            -scheme "${{ inputs.scheme }}" \
            -configuration "${{ inputs.configuration }}" \
            -destination "generic/platform=iOS" \
            -archivePath "./build/${{ inputs.scheme }}.xcarchive" \
            -skipMacroValidation \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            | xcbeautify

      - name: Ad hoc sign archived products before export
        env:
          APP_NAME: ${{ inputs.scheme }}
          PROVIDED_ENTITLEMENTS_PATH: ${{ inputs.entitlements-path }}
        run: |
          set -euo pipefail

          find_entitlements() {
            local app_name="$1"
            local target_name="$2"

            if [ -n "$PROVIDED_ENTITLEMENTS_PATH" ] && [ "$target_name" = "$app_name" ]; then
              printf '%s\n' "$PROVIDED_ENTITLEMENTS_PATH"
              return
            fi

            if [ -f "Apps/${app_name}/Derived/Entitlements/${target_name}.entitlements" ]; then
              printf '%s\n' "Apps/${app_name}/Derived/Entitlements/${target_name}.entitlements"
              return
            fi

            if [ -f "Apps/${app_name}/Sources/${target_name}.entitlements" ]; then
              printf '%s\n' "Apps/${app_name}/Sources/${target_name}.entitlements"
              return
            fi

            if [ "$target_name" = "Verse" ] && [ -f "Apps/Verse/Sources/YouTubeSubtitle.entitlements" ]; then
              printf '%s\n' "Apps/Verse/Sources/YouTubeSubtitle.entitlements"
              return
            fi

            return 1
          }

          sign_product() {
            local product_path="$1"
            local entitlements_file="$2"
            local product_name
            product_name="$(basename "$product_path")"

            if [ -n "$entitlements_file" ] && [ -f "$entitlements_file" ]; then
              codesign --entitlements "$entitlements_file" --force --sign "-" "$product_path"
              echo "Signed ${product_name} with entitlements: ${entitlements_file}"
            else
              codesign --force --sign "-" "$product_path"
              echo "Signed ${product_name} without additional entitlements"
            fi
          }

          sign_nested_code() {
            local container_path="$1"

            if [ -d "${container_path}/Frameworks" ]; then
              for framework_path in "${container_path}"/Frameworks/*.framework; do
                [ -d "$framework_path" ] || continue
                sign_product "$framework_path" ""
              done

              for dylib_path in "${container_path}"/Frameworks/*.dylib; do
                [ -f "$dylib_path" ] || continue
                sign_product "$dylib_path" ""
              done
            fi
          }

          app_path="./build/${APP_NAME}.xcarchive/Products/Applications/${APP_NAME}.app"

          if [ ! -d "$app_path" ]; then
            echo "App not found in archive: $app_path"
            exit 1
          fi

          if [ -d "${app_path}/PlugIns" ]; then
            for extension_path in "${app_path}"/PlugIns/*.appex; do
              [ -d "$extension_path" ] || continue

              extension_name="$(basename "$extension_path" .appex)"
              extension_entitlements="$(find_entitlements "$APP_NAME" "$extension_name" || true)"
              sign_nested_code "$extension_path"
              sign_product "$extension_path" "$extension_entitlements"
            done
          fi

          app_entitlements="$(find_entitlements "$APP_NAME" "$APP_NAME" || true)"
          sign_nested_code "$app_path"
          sign_product "$app_path" "$app_entitlements"

      - name: Create ExportOptions.plist
        env:
          TEAM_ID: ${{ secrets.TEAM_ID }}
        run: |
          mkdir -p ./build
          cat > ./build/ExportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>app-store-connect</string>
              <key>destination</key>
              <string>upload</string>
              <key>signingStyle</key>
              <string>automatic</string>
              <key>teamID</key>
              <string>$TEAM_ID</string>
              <key>uploadSymbols</key>
              <true/>
              <key>uploadBitcode</key>
              <false/>
              <key>manageAppVersionAndBuildNumber</key>
              <true/>
          </dict>
          </plist>
          EOF

      - name: Export IPA
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          set -e
          set -o pipefail

          set -o pipefail && xcodebuild -exportArchive \
            -archivePath "./build/${{ inputs.scheme }}.xcarchive" \
            -exportPath "./build" \
            -exportOptionsPlist ./build/ExportOptions.plist \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/private_keys/AuthKey_${ASC_KEY_ID}.p8 \
            -authenticationKeyID "$ASC_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID" \
            | xcbeautify --renderer github-actions

      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: ./build/
          retention-days: 7
